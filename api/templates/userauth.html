<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://cdn.glitch.global/a26d5325-9ce6-457d-b855-7e466048ca04/icon.png?v=1741614190129" type="image/png">
    <meta name="author" content="Mumud">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Cap, Good Story - Login/Signup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Simple form styling */
        .auth-block {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: #f9f9f9;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .auth-block h2 {
            margin-bottom: 20px;
        }

        .auth-block input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            font-size: 1em;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .auth-block button {
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            background-color: #333;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        .auth-block button:hover {
            background-color: #555;
        }

        .toggle-link {
            margin-top: 15px;
            display: block;
            font-size: 0.9em;
            color: #333;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>No Cap, Good Story 🧢</h1>
    </header>

    <section class="auth-block" id="login-block">
        <h2>Login</h2>
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <button type="submit">Login</button>
        </form>
        <span class="toggle-link" onclick="showSignup()">Don't have an account? Sign up</span>
    </section>

    <section class="auth-block" id="signup-block" style="display:none;">
        <h2>Sign Up</h2>
        <form method="POST" action="/signup">
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="email" name="email" placeholder="Email" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <button type="submit">Sign Up</button>
        </form>
        <span class="toggle-link" onclick="showLogin()">Already have an account? Login</span>
    </section>

    <footer>
        <p class="credit">Website made by: <a href="https://chidee.glitch.me">Chidee</a></p>
        <p class="credit">NCG* ARCHIVES</p>
    </footer>

    <script>
        function showSignup() {
            document.getElementById('login-block').style.display = 'none';
            document.getElementById('signup-block').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('signup-block').style.display = 'none';
            document.getElementById('login-block').style.display = 'block';
        }
    </script>
</body>
</html>
